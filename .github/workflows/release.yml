name: Release
on:
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag_name:
        type: string
        required: true
        description: "The tag name to release (e.g. `v0.1.0`)"

permissions:
  contents: write

jobs:
  deploy-app:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup | Rust development environment
        uses: ./.github/actions/setup-rust
        with:
          apt-packages: libasound2-dev libusb-1.0-0-dev

      - name: Run | Build
        run: cargo build -p room-manager --release --locked

      - name: Run | Upload
        run: gh release upload ${{ inputs.tag_name }} target/release/room-manager
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup | Node.js development environment
        uses: ./.github/actions/setup-node

      - name: Run | Migrate
        run: pnpm run ci:migrate
        working-directory: packages/api
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run | Deploy
        run: pnpm run ci:deploy
        working-directory: packages/api
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
